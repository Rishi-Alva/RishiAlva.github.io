<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="alternate icon" href="/favicon.svg" />
		<meta name="theme-color" content="#070b14" />
		<title>Break-even calculator | Rishi Alva</title>
		<meta name="description" content="Units to break even given fixed costs, price, and variable cost per unit." />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="calculators.css" />
	</head>
	<body class="calc-page calc-theme--biz">
		<div class="site-bridge" role="navigation" aria-label="Site">
			<div class="site-bridge__inner">
				<div class="site-bridge__start">
				<a class="site-bridge__brand" href="../index.html">Rishi Alva</a>
				<span class="site-bridge__sep" aria-hidden="true">/</span>
				<a class="site-bridge__calc-home" href="index.html" aria-label="All calculators">
					<img class="site-bridge__mark" src="../images/calculators-logo.svg" width="28" height="28" alt="" decoding="async" />
				</a>
				<span class="site-bridge__sep" aria-hidden="true">/</span>
				<a class="site-bridge__crumb" href="index.html">Calculators</a>
				<span class="site-bridge__sep" aria-hidden="true">/</span>
				<span class="site-bridge__here">Break-even</span>
				</div>
				<a class="site-bridge__back" href="index.html">All calculators</a>
			</div>
		</div>

		<div class="wrap">
			<header class="hero">
				<p class="hero__eyebrow">Unit economics</p>
				<h1>Break-even analysis</h1>
				<p class="hero__lead">Q* = fixed costs ÷ (price − variable cost per unit). Contribution margin must be positive.</p>
			</header>

			<div class="calc-panel">
				<div class="field-row">
					<div class="field">
						<label for="fixed">Fixed costs ($)</label>
						<input type="number" id="fixed" inputmode="decimal" min="0" step="any" placeholder="180000" />
					</div>
					<div class="field">
						<label for="price">Price per unit ($)</label>
						<input type="number" id="price" inputmode="decimal" min="0" step="any" placeholder="49" />
					</div>
					<div class="field">
						<label for="var">Variable cost / unit ($)</label>
						<input type="number" id="var" inputmode="decimal" min="0" step="any" placeholder="22" />
					</div>
				</div>
				<button type="button" class="btn" id="go">Calculate</button>
				<div class="result" id="out" hidden role="status" aria-live="polite"></div>
			</div>

			<p class="disclaimer">Single-product, linear costs. Semi-variable costs and capacity limits are ignored.</p>
		</div>
		<script src="core.js"></script>
		<script src="break-even.js"></script>
	</body>
</html>
