<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
	<title id="title">Healthcare Cost Explorer</title>
	<desc id="desc">Formal app mark: comparison bars on a deep blue field suggesting transparent hospital cost data.</desc>
	<defs>
		<linearGradient id="hx-bg" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#0b1f33"/>
			<stop offset="50%" stop-color="#0f2847"/>
			<stop offset="100%" stop-color="#0a1628"/>
		</linearGradient>
		<linearGradient id="hx-bar" x1="0%" y1="100%" x2="0%" y2="0%">
			<stop offset="0%" stop-color="#0891b2"/>
			<stop offset="100%" stop-color="#22d3ee"/>
		</linearGradient>
		<linearGradient id="hx-accent" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#67e8f9"/>
			<stop offset="100%" stop-color="#18bfef"/>
		</linearGradient>
	</defs>
	<!-- Squircle app-icon shape -->
	<rect width="512" height="512" rx="116" fill="url(#hx-bg)"/>
	<!-- Subtle inner frame -->
	<rect x="40" y="40" width="432" height="432" rx="88" fill="none" stroke="rgba(103,232,249,0.12)" stroke-width="2"/>
	<!-- Baseline: clarity / measurement -->
	<line x1="104" y1="352" x2="408" y2="352" stroke="rgba(103,232,249,0.22)" stroke-width="8" stroke-linecap="round"/>
	<!-- Four ascending bars: cost comparison -->
	<rect x="118" y="268" width="52" height="84" rx="14" fill="url(#hx-bar)" opacity="0.72"/>
	<rect x="194" y="228" width="52" height="124" rx="14" fill="url(#hx-bar)" opacity="0.82"/>
	<rect x="270" y="188" width="52" height="164" rx="14" fill="url(#hx-bar)" opacity="0.92"/>
	<rect x="346" y="148" width="52" height="204" rx="14" fill="url(#hx-accent)"/>
	<!-- Minimal care node: formal plus in circle (health, not decorative) -->
	<circle cx="256" cy="124" r="36" fill="rgba(6,20,38,0.65)" stroke="url(#hx-accent)" stroke-width="5"/>
	<line x1="256" y1="106" x2="256" y2="142" stroke="#e8f7fc" stroke-width="6" stroke-linecap="round"/>
	<line x1="238" y1="124" x2="274" y2="124" stroke="#e8f7fc" stroke-width="6" stroke-linecap="round"/>
</svg>
