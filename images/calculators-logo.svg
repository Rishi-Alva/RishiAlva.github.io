<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
	<title id="title">Calculators</title>
	<desc id="desc">App mark: calculator with display and keypad on a deep field, cyan and teal gradients.</desc>
	<defs>
		<linearGradient id="calc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#0c1824"/>
			<stop offset="45%" stop-color="#0f2233"/>
			<stop offset="100%" stop-color="#08121c"/>
		</linearGradient>
		<linearGradient id="calc-screen" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#164e63"/>
			<stop offset="100%" stop-color="#0e7490"/>
		</linearGradient>
		<linearGradient id="calc-key" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#22d3ee"/>
			<stop offset="100%" stop-color="#06b6d4"/>
		</linearGradient>
		<linearGradient id="calc-key-accent" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#5eead4"/>
			<stop offset="100%" stop-color="#2dd4bf"/>
		</linearGradient>
	</defs>
	<rect width="512" height="512" rx="116" fill="url(#calc-bg)"/>
	<rect x="40" y="40" width="432" height="432" rx="88" fill="none" stroke="rgba(94,234,212,0.14)" stroke-width="2"/>
	<!-- Device body -->
	<rect x="88" y="96" width="336" height="320" rx="36" fill="rgba(6,22,36,0.55)" stroke="rgba(34,211,238,0.2)" stroke-width="3"/>
	<!-- Display -->
	<rect x="120" y="128" width="272" height="88" rx="16" fill="url(#calc-screen)" stroke="rgba(94,234,212,0.25)" stroke-width="2"/>
	<rect x="144" y="152" width="180" height="10" rx="4" fill="rgba(165,243,252,0.35)"/>
	<rect x="144" y="174" width="120" height="10" rx="4" fill="rgba(165,243,252,0.2)"/>
	<!-- Keypad: 4 columns x 3 rows -->
	<g fill="url(#calc-key)">
		<rect x="120" y="244" width="56" height="48" rx="12"/>
		<rect x="192" y="244" width="56" height="48" rx="12"/>
		<rect x="264" y="244" width="56" height="48" rx="12"/>
		<rect x="336" y="244" width="56" height="48" rx="12"/>
		<rect x="120" y="308" width="56" height="48" rx="12"/>
		<rect x="192" y="308" width="56" height="48" rx="12"/>
		<rect x="264" y="308" width="56" height="48" rx="12"/>
		<rect x="336" y="308" width="56" height="48" rx="12"/>
	</g>
	<!-- Accent operator key -->
	<rect x="264" y="372" width="128" height="48" rx="12" fill="url(#calc-key-accent)"/>
	<rect x="120" y="372" width="56" height="48" rx="12" fill="url(#calc-key)"/>
	<rect x="192" y="372" width="56" height="48" rx="12" fill="url(#calc-key)"/>
	<!-- Subtle equals on wide key -->
	<line x1="292" y1="396" x2="364" y2="396" stroke="rgba(8,25,38,0.55)" stroke-width="6" stroke-linecap="round"/>
	<line x1="292" y1="408" x2="364" y2="408" stroke="rgba(8,25,38,0.45)" stroke-width="6" stroke-linecap="round"/>
</svg>
